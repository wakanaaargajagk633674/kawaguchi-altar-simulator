name: Build rembg worker image

# 手動実行のみ（安全重視）。Actions タブから実行する。
on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      # 例: ghcr.io/wakanaaargajagk633674/kawaguchi-altar-simulator/iei-rembg-worker
      IMAGE: ghcr.io/${{ github.repository }}/iei-rembg-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (Dockerfile.runpod)
        uses: docker/build-push-action@v6
        with:
          context: workers/rembg-worker
          file: workers/rembg-worker/Dockerfile.runpod
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Summary
        run: |
          echo "Pushed:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ env.IMAGE }}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ env.IMAGE }}:sha-${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
